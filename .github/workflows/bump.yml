name: Bump cask on new release

# Polls packetThrower/PortFinder every 6 hours for stable AND
# pre-release tags, bumping the matching cask when either is out of
# date. Two casks live in this tap:
#
#   Casks/portfinder.rb        — tracks the latest stable release
#                                 (`gh release view --latest`, which
#                                 excludes pre-releases by default).
#   Casks/portfinder@alpha.rb  — tracks the highest pre-release tag
#                                 (everything with a `-alpha.N` /
#                                 `-beta.N` / `-rc.N` suffix).
#
# Both bumps run in the same job; either or both may produce a commit.
# Manual runs supported via workflow_dispatch.

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bump-cask
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: packetThrower/PortFinder
    steps:
      - uses: actions/checkout@v4

      - name: Bump casks
        run: |
          set -euo pipefail

          # bump_cask <cask-path> <new-version>
          #
          # Reads the current `version` line from <cask-path>, compares
          # to <new-version>, and if they differ downloads the matching
          # universal DMG, recomputes its SHA256, and rewrites the
          # version + sha256 lines in place. Sed regexes are anchored
          # to the indented stanza lines so the rest of the cask is
          # left untouched.
          bump_cask() {
            local file=$1
            local new=$2

            if [ -z "$new" ]; then
              echo "${file}: no upstream version, skipping"
              return 0
            fi

            local current
            current=$(grep -E '^\s*version "' "$file" | sed -E 's/.*"([^"]+)".*/\1/')
            if [ "$new" = "$current" ]; then
              echo "${file}: ${current} (no change)"
              return 0
            fi

            local dmg="https://github.com/${REPO}/releases/download/v${new}/PortFinder_${new}_universal.dmg"
            echo "${file}: ${current} -> ${new} (downloading $dmg)"
            curl -fsSL -o /tmp/portfinder.dmg "$dmg"
            [ -s /tmp/portfinder.dmg ] || { echo "DMG empty"; exit 1; }
            local sha
            sha=$(shasum -a 256 /tmp/portfinder.dmg | awk '{print $1}')
            rm -f /tmp/portfinder.dmg

            sed -i -E "s/^(\s*version )\"[^\"]+\"/\1\"${new}\"/" "$file"
            sed -i -E "s/^(\s*sha256 )\"[a-f0-9]+\"/\1\"${sha}\"/" "$file"
          }

          # Stable: `gh release view` returns the most recent
          # non-prerelease release.
          stable=$(gh release view --repo "$REPO" --json tagName -q .tagName)
          bump_cask "Casks/portfinder.rb" "${stable#v}"

          # Pre-release: list the latest 20 releases, filter to those
          # with isPrerelease=true, take the first one. Empty string
          # if the project has no pre-releases right now.
          prerelease=$(
            gh release list --repo "$REPO" --limit 20 \
              --json tagName,isPrerelease \
              -q '[.[] | select(.isPrerelease)] | .[0].tagName // ""'
          )
          bump_cask "Casks/portfinder@alpha.rb" "${prerelease#v}"

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain Casks)" ]; then
            echo "No cask changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks
          git commit -m "Bump casks via auto-bump workflow"
          git push
