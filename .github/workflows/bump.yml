name: Bump casks on new release

# Polls every tracked project's GitHub Releases every 6 hours,
# bumping matching casks (stable + pre-release) when their pinned
# version is out of date. Manual runs supported via
# workflow_dispatch.
#
# Currently tracking:
#
#   PortFinder  -> Casks/portfinder.rb        (stable, per-arch DMG)
#                  Casks/portfinder@alpha.rb  (pre-release, per-arch DMG)
#   Baudrun     -> Casks/baudrun.rb           (stable, per-arch DMG)
#                  Casks/baudrun@alpha.rb     (pre-release, per-arch DMG)
#
# Adding a new project is two lines per channel: pick `bump_universal`
# (single sha256 stanza) or `bump_per_arch` (`sha256 arm: ..., intel:
# ...`), and a URL template using `{VERSION}` and (for per-arch)
# `{ARCH}`. `bump_per_arch` takes optional 4th + 5th args for the
# arm + intel arch tokens; the defaults are `aarch64` and `x64`
# (historical Tauri bundle naming, kept available for back-compat
# with older taps). Current casks use `arm64` + `amd64` to match
# cargo-packager's filenames — pass them explicitly so future
# readers don't have to dig.

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bump-cask
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Bump casks
        run: |
          set -euo pipefail

          # bump_universal <cask-path> <new-version> <url-template>
          #
          # url-template uses {VERSION} placeholder. Downloads the
          # single artifact, recomputes SHA256, and rewrites the
          # `version` line and the single `sha256 "..."` line in
          # place. Sed regexes are anchored to the indented stanza
          # lines so the rest of the cask is left untouched.
          bump_universal() {
            local file=$1 new=$2 tpl=$3
            if [ -z "$new" ]; then
              echo "${file}: no upstream version, skipping"
              return 0
            fi
            local current
            current=$(grep -E '^\s*version "' "$file" | sed -E 's/.*"([^"]+)".*/\1/')
            if [ "$new" = "$current" ]; then
              echo "${file}: ${current} (no change)"
              return 0
            fi
            local url="${tpl//\{VERSION\}/$new}"
            echo "${file}: ${current} -> ${new} (downloading $url)"
            curl -fsSL -o /tmp/dl.bin "$url"
            [ -s /tmp/dl.bin ] || { echo "${url} empty"; exit 1; }
            local sha
            sha=$(shasum -a 256 /tmp/dl.bin | awk '{print $1}')
            rm -f /tmp/dl.bin
            sed -i -E "s/^(\s*version )\"[^\"]+\"/\1\"${new}\"/" "$file"
            sed -i -E "s/^(\s*sha256 )\"[a-f0-9]+\"/\1\"${sha}\"/" "$file"
          }

          # bump_per_arch <cask-path> <new-version> <url-template>
          #                [arm-arch-token] [intel-arch-token]
          #
          # url-template uses {VERSION} and {ARCH} placeholders.
          # Downloads BOTH per-arch artifacts, recomputes SHA256 for
          # each, and rewrites the `version` line plus both
          # `sha256 arm: "..."` and `intel: "..."` lines. The
          # arm/intel split is anchored to the keyword name on each
          # line so the multi-line `sha256` stanza can be edited
          # without disturbing surrounding context.
          #
          # 4th + 5th args override the arch tokens; defaults are
          # `aarch64` / `x64` (historical Tauri bundle naming, kept
          # available as defaults for back-compat). Current Baudrun
          # casks pass `arm64` / `amd64` explicitly to match
          # cargo-packager's filenames; see the Baudrun block below.
          bump_per_arch() {
            local file=$1 new=$2 tpl=$3
            local arm_arch=${4:-aarch64} intel_arch=${5:-x64}
            if [ -z "$new" ]; then
              echo "${file}: no upstream version, skipping"
              return 0
            fi
            local current
            current=$(grep -E '^\s*version "' "$file" | sed -E 's/.*"([^"]+)".*/\1/')
            if [ "$new" = "$current" ]; then
              echo "${file}: ${current} (no change)"
              return 0
            fi

            local arm_url="${tpl//\{VERSION\}/$new}"
            arm_url="${arm_url//\{ARCH\}/$arm_arch}"
            local intel_url="${tpl//\{VERSION\}/$new}"
            intel_url="${intel_url//\{ARCH\}/$intel_arch}"

            echo "${file}: ${current} -> ${new}"
            echo "  arm:   ${arm_url}"
            curl -fsSL -o /tmp/arm.bin "$arm_url"
            [ -s /tmp/arm.bin ] || { echo "arm artifact empty"; exit 1; }
            local arm_sha
            arm_sha=$(shasum -a 256 /tmp/arm.bin | awk '{print $1}')

            echo "  intel: ${intel_url}"
            curl -fsSL -o /tmp/intel.bin "$intel_url"
            [ -s /tmp/intel.bin ] || { echo "intel artifact empty"; exit 1; }
            local intel_sha
            intel_sha=$(shasum -a 256 /tmp/intel.bin | awk '{print $1}')

            rm -f /tmp/arm.bin /tmp/intel.bin

            sed -i -E "s/^(\s*version )\"[^\"]+\"/\1\"${new}\"/" "$file"
            sed -i -E "s/^(\s*sha256\s+arm:\s+)\"[a-f0-9]+\"/\1\"${arm_sha}\"/" "$file"
            sed -i -E "s/^(\s+intel:\s+)\"[a-f0-9]+\"/\1\"${intel_sha}\"/" "$file"
          }

          # Stable for <repo>: most recent non-prerelease tag (`gh
          # release view --latest` excludes pre-releases by default).
          stable_for() {
            gh release view --repo "$1" --json tagName -q .tagName 2>/dev/null || true
          }

          # Pre-release for <repo>: highest pre-release tag, or empty
          # string if the project has no pre-releases right now.
          prerelease_for() {
            gh release list --repo "$1" --limit 20 \
              --json tagName,isPrerelease \
              -q '[.[] | select(.isPrerelease)] | .[0].tagName // ""'
          }

          # ----- PortFinder (per-arch DMG) -----
          # 4.x's release pipeline cross-compiles both Apple
          # targets on the macos-26 CI runner and ships
          # `PortFinder_<ver>_arm64.dmg` + `_amd64.dmg`
          # separately. The pre-4.x stable was Tauri's
          # universal DMG; this auto-bumper's old
          # `bump_universal` line followed the universal URL
          # template and broke when 4.0.1 dropped (404 on the
          # non-existent universal asset). Both stable and
          # @alpha casks have been per-arch since the 4.0.0
          # cutover, so they share the per-arch path here.
          PF_REPO=packetThrower/PortFinder
          PF_TPL="https://github.com/${PF_REPO}/releases/download/v{VERSION}/PortFinder_{VERSION}_{ARCH}.dmg"
          PF_STABLE=$(stable_for "$PF_REPO")
          PF_PRE=$(prerelease_for "$PF_REPO")
          bump_per_arch "Casks/portfinder.rb"        "${PF_STABLE#v}" "$PF_TPL" \
            arm64 amd64
          bump_per_arch "Casks/portfinder@alpha.rb"  "${PF_PRE#v}"    "$PF_TPL" \
            arm64 amd64

          # ----- Baudrun (per-arch DMG) -----
          # Both stable and pre-release ship from cargo-packager now
          # (stable since v0.9.7; the prior Tauri-era stable used
          # aarch64 / x64 in filenames — bump_per_arch's historical
          # defaults — but the v0.9.7 cutover moved stable onto the
          # gpui build's arm64 / amd64 naming). Pass tokens explicitly
          # on both lines for clarity, even though they're the same
          # pair, so future readers don't have to remember which
          # defaults applied to which cask.
          BR_REPO=packetThrower/Baudrun
          BR_TPL="https://github.com/${BR_REPO}/releases/download/v{VERSION}/Baudrun_{VERSION}_{ARCH}.dmg"
          BR_STABLE=$(stable_for "$BR_REPO")
          BR_PRE=$(prerelease_for "$BR_REPO")
          bump_per_arch "Casks/baudrun.rb"        "${BR_STABLE#v}" "$BR_TPL" \
            arm64 amd64
          bump_per_arch "Casks/baudrun@alpha.rb"  "${BR_PRE#v}"    "$BR_TPL" \
            arm64 amd64

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain Casks)" ]; then
            echo "No cask changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks
          git commit -m "Bump casks via auto-bump workflow"
          git push
